name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.x

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          # 最初は警告だけでCIを止めない（マージをブロックしない）場合は true にします
          soft_fail: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        run: flake8 --config=cloud-run/.flake8 cloud-run/app

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: cloud-run
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

  build:
    name: Build Container Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      image_name: ${{ steps.build-image.outputs.image_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for WIF provider
        id: check_wif
        run: echo "wif_enabled=${{ secrets.WIF_PROVIDER != '' }}" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: Configure Docker
        if: steps.check_wif.outputs.wif_enabled == 'true'
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev

      - name: Build and push container image
        if: steps.check_wif.outputs.wif_enabled == 'true'
        id: build-image
        run: |
          IMAGE_NAME="${{ vars.REGION }}-docker.pkg.dev/${{ vars.TOOL_PROJECT_ID }}/iam-access-repo/iam-access-executor:${{ github.sha }}"
          docker build -t $IMAGE_NAME ./cloud-run
          docker push $IMAGE_NAME
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo $IMAGE_NAME > image_name.txt

      - name: Upload image name artifact
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: image-name
          path: image_name.txt
          if-no-files-found: error

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for WIF provider
        id: check_wif
        run: echo "wif_enabled=${{ secrets.WIF_PROVIDER != '' }}" >> $GITHUB_OUTPUT

      - name: Download image name artifact
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: actions/download-artifact@v7
        with:
          name: image-name
          path: .
          if-no-files-found: error

      - name: Authenticate to Google Cloud
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Create tfvars file
        if: steps.check_wif.outputs.wif_enabled == 'true'
        run: |
          CLOUD_RUN_IMAGE=$(cat image_name.txt)
          echo "tool_project_id = "${{ vars.TOOL_PROJECT_ID }}"" > terraform/environment.auto.tfvars
          echo "region = "${{ vars.REGION }}"" >> terraform/environment.auto.tfvars
          echo "managed_project_id = "${{ vars.MANAGED_PROJECT_ID }}"" >> terraform/environment.auto.tfvars
          echo "organization_id = "${{ vars.ORGANIZATION_ID }}"" >> terraform/environment.auto.tfvars
          echo "cloud_run_image = "$CLOUD_RUN_IMAGE"" >> terraform/environment.auto.tfvars
          echo "dataset_id = "${{ vars.BQ_DATASET_ID }}"" >> terraform/environment.auto.tfvars
          echo "cloud_run_service_name = "iam-access-executor"" >> terraform/environment.auto.tfvars
          echo "gas_trigger_owner_email = "${{ vars.GAS_TRIGGER_OWNER_EMAIL }}"" >> terraform/environment.auto.tfvars
          echo "alert_notification_email = "${{ vars.ALERT_NOTIFICATION_EMAIL }}"" >> terraform/environment.auto.tfvars
          echo "alert_notification_webhook_url = "${{ secrets.ALERT_NOTIFICATION_WEBHOOK_URL }}"" >> terraform/environment.auto.tfvars
          echo "workspace_customer_id = "${{ vars.WORKSPACE_CUSTOMER_ID }}"" >> terraform/environment.auto.tfvars
          echo "resource_collection_schedule = "0 3 * * *"" >> terraform/environment.auto.tfvars
          echo "group_collection_schedule = "30 3 * * *"" >> terraform/environment.auto.tfvars
          echo "iam_policy_collection_schedule = \"15 3 * * *\"" >> terraform/environment.auto.tfvars
          echo "reconciliation_schedule = "0 4 * * *"" >> terraform/environment.auto.tfvars
          echo "revoke_expired_permissions_schedule = "0 5 * * *"" >> terraform/environment.auto.tfvars
          echo "iam_bindings_history_update_schedule = "0 2 * * *"" >> terraform/environment.auto.tfvars
          echo "scheduler_time_zone = "Asia/Tokyo"" >> terraform/environment.auto.tfvars

      - name: Setup Terraform
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.x

      - name: Terraform Init
        if: steps.check_wif.outputs.wif_enabled == 'true'
        id: init
        run: terraform init -backend-config=../backend.hcl
        working-directory: terraform

      - name: Terraform Plan
        if: steps.check_wif.outputs.wif_enabled == 'true'
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        working-directory: terraform
        continue-on-error: true

      - name: Post Plan to PR
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan 📖`${{ steps.plan.outcome }}`
            <details><summary>Show Plan</summary>

            ```

            ${{ steps.plan.outputs.stdout }}
            ```

            </details>

            *Pushed by: @${{ github.actor }}, Action: `${{ github.event_name }}`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Upload Plan Artifact
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/tfplan
          if-no-files-found: error

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for WIF provider
        id: check_wif
        run: echo "wif_enabled=${{ secrets.WIF_PROVIDER != '' }}" >> $GITHUB_OUTPUT

      - name: Download Plan Artifact
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: actions/download-artifact@v7
        with:
          name: tfplan
          path: terraform
          if-no-files-found: error

      - name: Authenticate to Google Cloud
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        if: steps.check_wif.outputs.wif_enabled == 'true'
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.x

      - name: Terraform Init
        if: steps.check_wif.outputs.wif_enabled == 'true'
        run: terraform init -backend-config=../backend.hcl
        working-directory: terraform

      - name: Terraform Apply
        if: steps.check_wif.outputs.wif_enabled == 'true'
        run: terraform apply -input=false tfplan
        working-directory: terraform
