name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.x # Or the specific version used in the project

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Or the specific version used in the project

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        run: flake8 cloud-run/app

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: cloud-run
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2 # Use a specific version for consistency

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    # Add 'id-token' with 'write' permission.
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: 'projects/<PROJECT_NUMBER>/locations/global/workloadIdentityPools/<POOL_ID>/providers/<PROVIDER_ID>'
          service_account: 'iam-access-ci-sa@${{ vars.TOOL_PROJECT_ID }}.iam.gserviceaccount.com' # Placeholder SA

      - name: Setup gcloud
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev

      - name: Build and push container image
        run: |
          docker build -t ${{ vars.REGION }}-docker.pkg.dev/${{ vars.TOOL_PROJECT_ID }}/iam-access-repo/iam-access-executor:${{ github.sha }} ./cloud-run
          docker push ${{ vars.REGION }}-docker.pkg.dev/${{ vars.TOOL_PROJECT_ID }}/iam-access-repo/iam-access-executor:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.x

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="cloud_run_image=${{ vars.REGION }}-docker.pkg.dev/${{ vars.TOOL_PROJECT_ID }}/iam-access-repo/iam-access-executor:${{ github.sha }}"
        working-directory: terraform
